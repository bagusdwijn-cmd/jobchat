{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2>BabyAGI / AutoGPT Style Planner</h2>
  <form action="/babyagi/run" method="post">
    <label>Pilih user Telegram (chat_id)</label>
    <select name="chat_id" required>
      {% for u in users %}
        <option value="{{ u.chat_id }}">{{ u.chat_id }} - {{ u.full_name or "Tanpa nama" }}</option>
      {% endfor %}
    </select>
    <label>Goal besar</label>
    <textarea name="goal" rows="6" required>Cari kerja di bidang manufaktur Indonesia, lamar semua yang sesuai, dan lapor ke Telegram saya kalau ada tahapan interview.</textarea>
    <button type="submit">Jalankan Planner</button>
  </form>
</div>

{% if error %}<div class="card"><div class="error">{{ error }}</div></div>{% endif %}

{% if result %}
<div class="card">
  <h3>Summary</h3><pre>{{ result.summary }}</pre>
  <h3>Steps</h3><pre>{{ result.steps_pretty }}</pre>
  <h3>Executions</h3><pre>{{ result.exec_pretty }}</pre>
  <h3>Result</h3><pre>{{ result.result }}</pre>
</div>
{% endif %}
{% endblock %}
