{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2>Cody / Sourcegraph Style Context Agent</h2>
  <form action="/cody/run" method="post" enctype="multipart/form-data">
    <label>Pilih user Telegram (chat_id)</label>
    <select name="chat_id" required>
      {% for u in users %}
        <option value="{{ u.chat_id }}">{{ u.chat_id }} - {{ u.full_name or "Tanpa nama" }}</option>
      {% endfor %}
    </select>
    <label>Upload repo ZIP</label>
    <input type="file" name="repo_zip" accept=".zip" required>
    <label>Pertanyaan / instruksi</label>
    <textarea name="question" rows="6" required>Gunakan resume PDF saya, cari bagian kode yang bisa dipakai untuk menyesuaikan cover letter berdasarkan stack teknologi perusahaan.</textarea>
    <button type="submit">Analisa Repo</button>
  </form>
</div>

{% if error %}<div class="card"><div class="error">{{ error }}</div></div>{% endif %}

{% if answer %}
<div class="card">
  <h3>Jawaban</h3><pre>{{ answer.answer }}</pre>
  <h3>File yang dipakai</h3><pre>{{ answer.used_files|join("\n") }}</pre>
</div>
{% endif %}
{% endblock %}
